- name: Ensure UFW is installed
  apt:
    name: ufw
    state: present

- name: Set UFW default incoming policy to deny
  ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy to allow
  ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
