# Copy to inventory.ini and fill in your values. inventory.ini is gitignored.
[media]
<ip_address>

[media:vars]
ansible_user=<user>
ansible_ssh_private_key_file=<private_key>

# Server
server_domain=media.example.com
admin_email=admin@example.com
server_name=media-server
frontend_title=My Media Server
timezone=Europe/London

# Local Deployment & Storage Options (uncomment/modify for local setup)
# For local deployment on the same PC:
# ansible_connection=local
# ansible_python_interpreter=/usr/bin/python3
#
# Custom media content directory (e.g. external HDD/SSD mount). Must be a
# dedicated absolute path, not /, /home, /etc, /usr, /var, etc.
# content_dir=/mnt/external-drive/content
#
# Bind host (set to 0.0.0.0 to expose admin UIs to a trusted LAN).
# If you do this, keep enable_firewall=true and set trusted LAN rules below.
# bind_host=0.0.0.0
# trusted_lan_cidrs=["192.168.1.0/24"]
# admin_ingress_interfaces=["eth0"]
# Set this only if you intentionally accept unrestricted LAN exposure.
# allow_lan_admin_exposure=false
#
# Disable UFW only if you manage equivalent firewall rules yourself
# enable_firewall=false

# qBittorrent peer ports are not published by default. Enable only when you
# intentionally want an inbound peer port exposed on qbittorrent_peer_bind_host.
# publish_bittorrent_peer_ports=true
# qbittorrent_peer_port=6881
# qbittorrent_peer_bind_host=0.0.0.0

# Optional VPN Integration (via Gluetun container)
# vpn_enabled=true
#
# Named providers (e.g. nordvpn, mullvad, pia — see Gluetun's docs for the
# full list) auto-resolve server details, so only credentials are needed:
# vpn_provider=nordvpn
# vpn_type=openvpn
# vpn_username=XXXX
# vpn_password=XXXX
# vpn_server_countries=Australia
#
# vpn_provider=custom requires a manually-configured WireGuard peer instead —
# all of the following are required (unlike named providers, Gluetun cannot
# infer them):
# vpn_provider=custom
# vpn_type=wireguard
# vpn_wireguard_private_key=XXXX
# vpn_wireguard_addresses=10.0.0.2/32
# vpn_wireguard_endpoint_ip=XXX.XXX.XXX.XXX
# vpn_wireguard_endpoint_port=51820
# vpn_wireguard_public_key=XXXX
# vpn_wireguard_preshared_key=XXXX

# Uncomment if your VPS uses a non-standard SSH port
# ssh_port=22

# Optional secrets — auto-generated into .credentials/ (gitignored) when
# omitted, so re-runs reuse the same value. Set them here to choose your own.
# Seerr has no separate login: it reuses the Jellyfin username/password.
# qbittorrent_password=<XXXX>
# jellyfin_password=<XXXX>
# prowlarr_api_key=<32-char-hex>
# radarr_api_key=<32-char-hex>
# sonarr_api_key=<32-char-hex>
