# Copy to inventory.ini and fill in your values. inventory.ini is gitignored.
[media]
<ip_address>

[media:vars]
ansible_user=<user>
ansible_ssh_private_key_file=<private_key>

# Server
server_domain=media.example.com
admin_email=admin@example.com
server_name=media-server
frontend_title=My Media Server
timezone=Europe/London

# Local Deployment & Storage Options (uncomment/modify for local setup)
# For local deployment on the same PC:
# ansible_connection=local
# ansible_python_interpreter=/usr/bin/python3
#
# Custom media content directory (e.g. external HDD/SSD mount)
# content_dir=/mnt/external-drive/content
#
# Bind host (set to 0.0.0.0 to expose services to local network LAN)
# bind_host=0.0.0.0
#
# Disable UFW firewall on a local PC
# enable_firewall=false

# Optional VPN Integration (via Gluetun container)
# vpn_enabled=true
# vpn_provider=custom
# vpn_type=wireguard
# vpn_username=XXXX
# vpn_password=XXXX
# vpn_wireguard_private_key=XXXX
# vpn_wireguard_addresses=10.0.0.2/32

# Uncomment if your VPS uses a non-standard SSH port
# ssh_port=22

# Optional secrets — auto-generated into .credentials/ (gitignored) when
# omitted, so re-runs reuse the same value. Set them here to choose your own.
# Seerr has no separate login: it reuses the Jellyfin username/password.
# qbittorrent_password=<XXXX>
# jellyfin_password=<XXXX>
# prowlarr_api_key=<32-char-hex>
# radarr_api_key=<32-char-hex>
# sonarr_api_key=<32-char-hex>
