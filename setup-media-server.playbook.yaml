---
- name: Setup Media Server
  hosts: media
  gather_facts: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Install Docker prerequisites
      become: yes
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - python3-pip
        state: present
        update_cache: yes
      tags:
        - setup
        - docker

    - name: Add Docker GPG key
      become: yes
      apt_key:
        url: https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg
        state: present
      tags:
        - setup
        - docker

    - name: Add Docker apt repository
      become: yes
      apt_repository:
        repo: "deb [arch={{ ansible_facts.architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}] https://download.docker.com/linux/{{ ansible_facts.distribution | lower }} {{ ansible_facts.distribution_release }} stable"
        state: present
        filename: docker
      tags:
        - setup
        - docker

    - name: Install Docker CE and Compose plugin
      become: yes
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      tags:
        - setup
        - docker

    - name: Add user to docker group
      become: yes
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      tags:
        - setup
        - docker

    - name: Ensure Docker service is started
      become: yes
      systemd:
        name: docker
        state: started
        enabled: yes
      tags:
        - setup
        - docker

    - name: Setup UFW
      become: yes
      import_tasks: ./common/setup-ufw.tasks.yaml
      tags:
        - setup
        - firewall

    - name: Create necessary directories
      file:
        path: "{{ root_dir }}/{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - content/media/movies
        - content/media/tv
        - content/torrents/movies
        - content/torrents/tv
        - config/traefik/letsencrypt
        - config/init
        - scripts
        - jellyfin
        - seerr
        - torrent/config/qBittorrent
        - media-management/prowlarr
        - media-management/radarr
        - media-management/sonarr
      tags:
        - setup
        - directories

    - name: Set Seerr config directory ownership for node user (UID 1000)
      file:
        path: "{{ seerr_dir }}"
        state: directory
        mode: "0755"
        owner: "1000"
        group: "1000"
      tags:
        - setup
        - directories
        - seerr

    - name: Generate qBittorrent encrypted password
      block:
        - name: Download the password generator
          get_url:
            url: https://github.com/saltydk/qbt_pw_gen/releases/download/v1.0.2/qbt_pw_gen-v1.0.2-linux-amd64
            dest: "{{ root_dir }}/config/qbt_pw_gen"
            mode: "0755"

        - name: Generate the password hash
          command: "{{ root_dir }}/config/qbt_pw_gen {{ qbittorrent_password }}"
          register: password_output
          changed_when: false

        - name: Store the generated password hash
          set_fact:
            qbittorrent_password_pbkdf2: "{{ password_output.stdout }}"

        - name: Remove the password generator executable
          file:
            path: "{{ root_dir }}/config/qbt_pw_gen"
            state: absent
      tags:
        - setup
        - torrent

    - name: Template stack configuration files
      template:
        src: "{{ item.src }}"
        dest: "{{ root_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { src: compose.yaml.j2, dest: compose.yaml }
        - { src: .env.j2, dest: .env, mode: "0600" }
        - { src: config/traefik.yml.j2, dest: config/traefik/traefik.yml }
        - { src: config/qbittorrent/qBittorrent.conf.j2, dest: torrent/config/qBittorrent/qBittorrent.conf }
        - { src: config/radarr.config.xml.j2, dest: media-management/radarr/config.xml }
        - { src: config/sonarr.config.xml.j2, dest: media-management/sonarr/config.xml }
        - { src: config/prowlarr.config.xml.j2, dest: media-management/prowlarr/config.xml }
        - { src: config/init/radarr.json.j2, dest: config/init/radarr.json }
        - { src: config/init/sonarr.json.j2, dest: config/init/sonarr.json }
        - { src: config/init/prowlarr.json.j2, dest: config/init/prowlarr.json }
        - { src: config/init/seerr.json.j2, dest: config/init/seerr.json }
      tags:
        - setup
        - config

    - name: Copy static configuration files
      copy:
        src: "{{ item.src }}"
        dest: "{{ root_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { src: config/qbittorrent/categories.json, dest: torrent/config/qBittorrent/categories.json }
        - { src: scripts/init-services.sh, dest: scripts/init-services.sh, mode: "0755" }
      tags:
        - setup
        - config

    - name: Start media server stack
      become: yes
      community.docker.docker_compose_v2:
        project_src: "{{ root_dir }}"
        state: present
        recreate: auto
      tags:
        - compose
        - jellyfin
        - seerr

    - name: Run one-shot service initialisation
      command: sg docker "{{ root_dir }}/scripts/init-services.sh"
      args:
        chdir: "{{ root_dir }}"
      register: init_result
      changed_when: "'All services initialised' in init_result.stdout"
      tags:
        - init
        - jellyfin
        - seerr
        - media-management
        - frontend
