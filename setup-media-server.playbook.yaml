---
- name: Setup Media Server
  hosts: media
  gather_facts: yes
  pre_tasks:
    - name: Load media server defaults
      set_fact:
        media_defaults: "{{ lookup('file', playbook_dir ~ '/vars.yml') | from_yaml }}"
      tags:
        - always

    - name: Validate required configuration
      assert:
        that:
          - server_domain is defined
          - admin_email is defined
          - server_name is defined
          - frontend_title is defined
          - timezone is defined
        fail_msg: >-
          Missing required variables. Copy inventory.example.ini to
          inventory.ini and fill in the [media:vars] section.
      tags:
        - always

    - name: Apply media server defaults unless already overridden
      set_fact:
        "{{ item.key }}": "{{ lookup('vars', item.key, default=item.value) }}"
      loop: "{{ media_defaults | dict2items }}"
      tags:
        - always

    - name: Render root directory default
      set_fact:
        root_dir: "{{ root_dir | replace('{{ ansible_user }}', ansible_user) | replace('{{ server_name }}', server_name) }}"
      tags:
        - always

    - name: Render content directory default
      set_fact:
        content_dir: "{{ content_dir | replace('{{ root_dir }}', root_dir) }}"
      tags:
        - always

    - name: Render derived directory defaults
      set_fact:
        media_dir: "{{ media_dir | replace('{{ content_dir }}', content_dir) }}"
        torrents_dir: "{{ torrents_dir | replace('{{ content_dir }}', content_dir) }}"
        config_dir: "{{ config_dir | replace('{{ root_dir }}', root_dir) }}"
        jellyfin_dir: "{{ jellyfin_dir | replace('{{ root_dir }}', root_dir) }}"
        seerr_dir: "{{ seerr_dir | replace('{{ root_dir }}', root_dir) }}"
        qbittorrent_dir: "{{ qbittorrent_dir | replace('{{ root_dir }}', root_dir) }}"
        management_dir: "{{ management_dir | replace('{{ root_dir }}', root_dir) }}"
      tags:
        - always

    - name: Render user-facing defaults
      set_fact:
        jellyfin_server_name: "{{ jellyfin_server_name | replace('{{ server_name }}', server_name) }}"
        qbittorrent_username: "{{ qbittorrent_username | replace('{{ ansible_user }}', ansible_user) }}"
        qbittorrent_peer_bind_host: "{{ qbittorrent_peer_bind_host | replace('{{ bind_host }}', bind_host) }}"
      tags:
        - always

    # init-services.sh always curls 127.0.0.1 to reach the freshly-published
    # container ports, since it runs on the target host itself. That only
    # resolves correctly when bind_host is 127.0.0.1 or 0.0.0.0 — Docker's
    # port publishing only NATs traffic addressed to the bound IP, so a
    # specific LAN IP here would make init fail to reach its own services.
    - name: Validate bind_host is one of the supported values
      assert:
        that:
          - bind_host in ['127.0.0.1', '0.0.0.0']
        fail_msg: >-
          bind_host must be either 127.0.0.1 (localhost-only) or 0.0.0.0
          (all interfaces, for LAN access) — service initialisation connects
          to the published ports via 127.0.0.1 and will fail to reach them
          if bound to a single specific LAN IP.
      tags:
        - always

    - name: Validate LAN exposure is explicit
      assert:
        that:
          - >-
            bind_host != '0.0.0.0' or
            trusted_lan_cidrs | length > 0 or
            allow_lan_admin_exposure | bool
          - >-
            bind_host != '0.0.0.0' or
            admin_ingress_interfaces | length > 0 or
            allow_lan_admin_exposure | bool
        fail_msg: >-
          bind_host=0.0.0.0 exposes admin UIs through Docker-published ports.
          Set trusted_lan_cidrs and admin_ingress_interfaces, or set
          allow_lan_admin_exposure=true to accept unrestricted LAN exposure.
      tags:
        - always

    - name: Validate content_dir is a dedicated absolute path
      assert:
        that:
          - content_dir is match('^/')
          - >-
            content_dir | regex_replace('/+$', '') not in
            ['/', '/bin', '/boot', '/dev', '/etc', '/home', '/opt',
            '/root', '/sbin', '/tmp', '/usr', '/var']
        fail_msg: >-
          content_dir must be an absolute, dedicated media directory. Do not
          point it at broad system paths such as /, /home, /etc, /usr, or /var.
      tags:
        - always

    - name: Resolve content and root paths
      command:
        cmd: >-
          python3 -c "import os,sys; [print(os.path.realpath(p)) for p in sys.argv[1:]]"
          "{{ content_dir }}" "{{ root_dir }}"
      register: resolved_paths
      changed_when: false
      check_mode: no
      tags:
        - always

    - name: Store resolved content and root paths
      set_fact:
        resolved_content_dir: "{{ resolved_paths.stdout_lines[0] }}"
        resolved_root_dir: "{{ resolved_paths.stdout_lines[1] }}"
      tags:
        - always

    - name: Validate resolved content_dir is safe
      assert:
        that:
          - resolved_content_dir not in ['/', '/etc', '/usr', '/var', '/root']
          - not resolved_content_dir.startswith('/etc/')
          - not resolved_content_dir.startswith('/usr/')
          - not resolved_content_dir.startswith('/var/')
          - not resolved_content_dir.startswith('/root/')
          - resolved_content_dir != resolved_root_dir
          - not resolved_root_dir.startswith(resolved_content_dir + '/')
          - media_dir is search('^' ~ content_dir)
          - torrents_dir is search('^' ~ content_dir)
        fail_msg: >-
          content_dir must resolve to a dedicated content directory, not a
          broad system path, deployment root, or ancestor of the deployment
          root.
      tags:
        - always

    - name: Validate OpenVPN credentials are complete
      assert:
        that:
          - vpn_username | default('') != ''
          - vpn_password | default('') != ''
        fail_msg: >-
          vpn_type=openvpn requires vpn_username and vpn_password.
      when:
        - vpn_enabled | default(false) | bool
        - vpn_type | default('wireguard') == 'openvpn'
      tags:
        - always

    - name: Validate WireGuard private key is set when needed
      assert:
        that:
          - vpn_wireguard_private_key | default('') != ''
        fail_msg: >-
          vpn_type=wireguard requires vpn_wireguard_private_key.
      when:
        - vpn_enabled | default(false) | bool
        - vpn_type | default('wireguard') == 'wireguard'
      tags:
        - always

    # Named providers (e.g. nordvpn) auto-resolve their WireGuard endpoint
    # from vpn_wireguard_private_key alone, but vpn_provider=custom has no
    # provider integration to infer these from — Gluetun needs them explicit.
    - name: Validate custom WireGuard VPN configuration is complete
      assert:
        that:
          - vpn_wireguard_private_key | default('') != ''
          - vpn_wireguard_addresses | default('') != ''
          - vpn_wireguard_endpoint_ip | default('') != ''
          - vpn_wireguard_endpoint_port | default('') != ''
          - vpn_wireguard_public_key | default('') != ''
        fail_msg: >-
          vpn_provider=custom with vpn_type=wireguard requires
          vpn_wireguard_private_key, vpn_wireguard_addresses,
          vpn_wireguard_endpoint_ip, vpn_wireguard_endpoint_port, and
          vpn_wireguard_public_key to all be set — see inventory.example.ini.
      when:
        - vpn_enabled | default(false) | bool
        - vpn_provider | default('custom') == 'custom'
        - vpn_type | default('wireguard') == 'wireguard'
      tags:
        - always

    - name: Auto-generate *arr API keys when not provided
      set_fact:
        "{{ item }}": "{{ lookup('ansible.builtin.password', inventory_dir ~ '/.credentials/' ~ item ~ ' chars=hexdigits length=32') | lower }}"
      when: lookup('ansible.builtin.vars', item, default='') == ''
      loop:
        - prowlarr_api_key
        - radarr_api_key
        - sonarr_api_key
      tags:
        - always

    # Persisted to .credentials/ so re-runs reuse the same value — the init
    # script only creates each user once, so a changing password would lock
    # you out. Charset is alphanumeric only: these are sourced from .env by
    # bash and embedded in curl JSON, so shell/JSON-special chars would break.
    - name: Auto-generate passwords when not provided
      set_fact:
        "{{ item }}": "{{ lookup('ansible.builtin.password', inventory_dir ~ '/.credentials/' ~ item ~ ' chars=ascii_letters,digits length=24') }}"
      when: lookup('ansible.builtin.vars', item, default='') == ''
      loop:
        - jellyfin_password
        - qbittorrent_password
      no_log: true
      tags:
        - always

  tasks:
    - name: Install Docker prerequisites
      become: yes
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - jq
          - python3
          - python3-pip
        state: present
        update_cache: yes
      tags:
        - setup
        - docker

    - name: Ensure apt keyrings directory exists
      become: yes
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags:
        - setup
        - docker

    - name: Add Docker GPG key
      become: yes
      get_url:
        url: https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags:
        - setup
        - docker

    - name: Add Docker apt repository
      become: yes
      apt_repository:
        repo: "deb [arch={{ ansible_facts.architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts.distribution | lower }} {{ ansible_facts.distribution_release }} stable"
        state: present
        filename: docker
      tags:
        - setup
        - docker

    - name: Install Docker CE and Compose plugin
      become: yes
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      tags:
        - setup
        - docker

    - name: Add user to docker group
      become: yes
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      tags:
        - setup
        - docker

    - name: Ensure Docker service is started
      become: yes
      systemd:
        name: docker
        state: started
        enabled: yes
      tags:
        - setup
        - docker

    - name: Setup UFW
      become: yes
      import_tasks: ./common/setup-ufw.tasks.yaml
      when: enable_firewall | default(true) | bool
      tags:
        - setup
        - firewall

    - name: Setup Docker-published admin UI firewall rules
      become: yes
      import_tasks: ./common/setup-docker-user-firewall.tasks.yaml
      when:
        - enable_firewall | default(true) | bool
        - bind_host == '0.0.0.0'
        - trusted_lan_cidrs | length > 0
        - admin_ingress_interfaces | length > 0
      tags:
        - setup
        - firewall

    - name: Create content directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - "{{ content_dir }}"
        - "{{ media_dir }}"
        - "{{ torrents_dir }}"
        - "{{ media_dir }}/movies"
        - "{{ media_dir }}/tv"
        - "{{ torrents_dir }}/movies"
        - "{{ torrents_dir }}/tv"
      tags:
        - setup
        - directories

    - name: Create configuration directories
      file:
        path: "{{ root_dir }}/{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - config/traefik/letsencrypt
        - config/init
        - scripts
        - jellyfin
        - seerr
        - torrent/config/qBittorrent
        - media-management/prowlarr
        - media-management/radarr
        - media-management/sonarr
        - media-management/bazarr/config
      tags:
        - setup
        - directories

    - name: Create VPN secrets directory
      file:
        path: "{{ root_dir }}/secrets"
        state: directory
        mode: "0700"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      when: vpn_enabled | default(false) | bool
      no_log: true
      tags:
        - setup
        - directories
        - config

    - name: Write VPN secret files
      copy:
        content: "{{ item.value }}\n"
        dest: "{{ root_dir }}/secrets/{{ item.name }}"
        mode: "0600"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { name: openvpn_user, value: "{{ vpn_username | default('') }}" }
        - { name: openvpn_password, value: "{{ vpn_password | default('') }}" }
        - { name: wireguard_private_key, value: "{{ vpn_wireguard_private_key | default('') }}" }
        - { name: wireguard_preshared_key, value: "{{ vpn_wireguard_preshared_key | default('') }}" }
      when:
        - vpn_enabled | default(false) | bool
        - item.value != ''
      no_log: true
      tags:
        - setup
        - config

    - name: Set Seerr config directory ownership for node user (UID 1000)
      file:
        path: "{{ seerr_dir }}"
        state: directory
        mode: "0755"
        owner: "1000"
        group: "1000"
      tags:
        - setup
        - directories
        - seerr

    - name: Read existing generated API keys from .env
      command:
        cmd: >-
          python3 -c "from pathlib import Path;
          parse_value=lambda value: value[1:-1].replace(chr(92) + chr(39), chr(39)).replace(chr(92) + chr(92), chr(92)) if len(value) >= 2 and value[0] == value[-1] == chr(39) else value;
          env=Path('.env');
          keys={};
          lines=env.read_text().splitlines() if env.exists() else [];
          [keys.setdefault(line.split('=',1)[0], parse_value(line.split('=',1)[1])) for line in lines if '=' in line and not line.lstrip().startswith('#')];
          print(keys.get('JELLYFIN_API_KEY',''));
          print(keys.get('BAZARR_API_KEY',''))"
        chdir: "{{ root_dir }}"
      register: existing_env_keys
      changed_when: false
      check_mode: no
      no_log: true
      tags:
        - setup
        - config

    - name: Preserve generated API keys for .env template
      set_fact:
        jellyfin_api_key: "{{ existing_env_keys.stdout_lines[0] | default('') }}"
        bazarr_api_key: "{{ existing_env_keys.stdout_lines[1] | default('') }}"
      no_log: true
      tags:
        - setup
        - config

    # qBittorrent stores its WebUI password as PBKDF2-HMAC-SHA512
    # (100k iterations, 16-byte salt). Persist the generated hash locally so
    # re-running config does not rewrite qBittorrent.conf for the same password.
    - name: Check local persisted qBittorrent PBKDF2 password hash
      delegate_to: localhost
      stat:
        path: "{{ inventory_dir }}/.credentials/qbittorrent_password_pbkdf2"
      register: qbittorrent_hash_file
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Load persisted qBittorrent PBKDF2 password hash
      set_fact:
        qbittorrent_password_pbkdf2: "{{ lookup('ansible.builtin.file', inventory_dir ~ '/.credentials/qbittorrent_password_pbkdf2') if qbittorrent_hash_file.stat.exists else '' }}"
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Read existing qBittorrent PBKDF2 password hash from server
      command:
        cmd: >-
          python3 -c "from pathlib import Path;
          path=Path('torrent/config/qBittorrent/qBittorrent.conf');
          lines=path.read_text().splitlines() if path.exists() else [];
          next((print(line.split('=',1)[1].strip().strip(chr(34))) for line in lines if line.startswith('WebUI\\Password_PBKDF2=')), None)"
        chdir: "{{ root_dir }}"
      register: existing_qbittorrent_hash
      changed_when: false
      check_mode: no
      when: qbittorrent_password_pbkdf2 == ''
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Reuse existing server qBittorrent password hash
      set_fact:
        qbittorrent_password_pbkdf2: "{{ existing_qbittorrent_hash.stdout_lines[0] }}"
      when:
        - existing_qbittorrent_hash is not skipped
        - existing_qbittorrent_hash.stdout_lines | length > 0
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Generate qBittorrent PBKDF2 password hash when missing
      command:
        cmd: >-
          python3 -c "import base64,hashlib,os,sys;
          pw=sys.stdin.read().rstrip('\n');
          salt=os.urandom(16);
          dk=hashlib.pbkdf2_hmac('sha512', pw.encode(), salt, 100000, dklen=64);
          print('@ByteArray(%s:%s)' % (base64.b64encode(salt).decode(), base64.b64encode(dk).decode()))"
        stdin: "{{ qbittorrent_password }}"
      register: password_output
      when: qbittorrent_password_pbkdf2 == ''
      check_mode: no
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Store generated qBittorrent password hash in memory
      set_fact:
        qbittorrent_password_pbkdf2: "{{ password_output.stdout }}"
      when: password_output is not skipped
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Ensure local credentials directory exists
      delegate_to: localhost
      file:
        path: "{{ inventory_dir }}/.credentials"
        state: directory
        mode: "0700"
      when: not qbittorrent_hash_file.stat.exists and qbittorrent_password_pbkdf2 != ''
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Persist qBittorrent password hash locally
      delegate_to: localhost
      copy:
        content: "{{ qbittorrent_password_pbkdf2 }}\n"
        dest: "{{ inventory_dir }}/.credentials/qbittorrent_password_pbkdf2"
        mode: "0600"
      when: not qbittorrent_hash_file.stat.exists and qbittorrent_password_pbkdf2 != ''
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Template stack configuration files
      template:
        src: "{{ item.src }}"
        dest: "{{ root_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { src: compose.yaml.j2, dest: compose.yaml }
        - { src: config/traefik.yml.j2, dest: config/traefik/traefik.yml }
        - { src: config/qbittorrent/qBittorrent.conf.j2, dest: torrent/config/qBittorrent/qBittorrent.conf }
        - { src: config/radarr.config.xml.j2, dest: media-management/radarr/config.xml }
        - { src: config/sonarr.config.xml.j2, dest: media-management/sonarr/config.xml }
        - { src: config/prowlarr.config.xml.j2, dest: media-management/prowlarr/config.xml }
        - { src: config/init/radarr.json.j2, dest: config/init/radarr.json }
        - { src: config/init/sonarr.json.j2, dest: config/init/sonarr.json }
        - { src: config/init/prowlarr.json.j2, dest: config/init/prowlarr.json }
        - { src: config/init/seerr.json.j2, dest: config/init/seerr.json }
        - { src: config/init/bazarr.json.j2, dest: config/init/bazarr.json }
      tags:
        - setup
        - config

    - name: Template environment file
      template:
        src: .env.j2
        dest: "{{ root_dir }}/.env"
        mode: "0600"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      diff: false
      no_log: true
      tags:
        - setup
        - config

    - name: Copy static configuration files
      copy:
        src: "{{ item.src }}"
        dest: "{{ root_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { src: config/qbittorrent/categories.json, dest: torrent/config/qBittorrent/categories.json }
        - { src: scripts/init-services.sh, dest: scripts/init-services.sh, mode: "0755" }
      tags:
        - setup
        - config

    - name: Start media server stack
      become: yes
      community.docker.docker_compose_v2:
        project_src: "{{ root_dir }}"
        state: present
        pull: "{{ compose_pull_policy }}"
        recreate: auto
        wait: true
        wait_timeout: 300
      tags:
        - compose
        - jellyfin
        - seerr

    - name: Run one-shot service initialisation
      become: yes
      command: "{{ root_dir }}/scripts/init-services.sh"
      args:
        chdir: "{{ root_dir }}"
      register: init_result
      changed_when: "'All services initialised' in init_result.stdout"
      tags:
        - init
        - jellyfin
        - seerr
        - media-management
        - frontend

    - name: Ensure init-updated files are owned by deployment user
      become: yes
      file:
        path: "{{ root_dir }}/{{ item }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - .env
        - config/.init-state
      tags:
        - init
        - setup

    - name: Verify service health endpoints
      uri:
        url: "{{ item.url }}"
        status_code: 200
        return_content: false
      loop:
        - { name: qbittorrent, url: "http://127.0.0.1:{{ qbittorrent_port }}/" }
        - { name: prowlarr, url: "http://127.0.0.1:{{ prowlarr_port }}/ping" }
        - { name: radarr, url: "http://127.0.0.1:{{ radarr_port }}/ping" }
        - { name: sonarr, url: "http://127.0.0.1:{{ sonarr_port }}/ping" }
        - { name: bazarr, url: "http://127.0.0.1:{{ bazarr_port }}/" }
        - { name: jellyfin, url: "http://127.0.0.1:{{ jellyfin_port }}/health" }
        - { name: seerr, url: "http://127.0.0.1:{{ seerr_port }}/api/v1/status" }
      loop_control:
        label: "{{ item.name }}"
      tags:
        - verify

    - name: Verify VPN egress through Gluetun namespace
      become: yes
      command: >-
        docker run --rm --network=container:gluetun alpine:3.22
        sh -c "apk add --no-cache wget >/dev/null && wget -qO- https://ipinfo.io/ip >/dev/null"
      register: vpn_egress_check
      changed_when: false
      no_log: true
      when: vpn_enabled | default(false) | bool
      tags:
        - verify

    - name: Report VPN egress verification
      debug:
        msg: VPN egress IP check succeeded
      when:
        - vpn_enabled | default(false) | bool
        - vpn_egress_check is succeeded
      tags:
        - verify
