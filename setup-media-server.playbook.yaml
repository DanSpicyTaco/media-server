---
- name: Setup Media Server
  hosts: media
  gather_facts: yes
  vars_files:
    - vars.yml

  pre_tasks:
    - name: Validate required configuration
      assert:
        that:
          - server_domain is defined
          - admin_email is defined
          - server_name is defined
          - frontend_title is defined
          - timezone is defined
        fail_msg: >-
          Missing required variables. Copy inventory.example.ini to
          inventory.ini and fill in the [media:vars] section.
      tags:
        - always

    - name: Auto-generate *arr API keys when not provided
      set_fact:
        "{{ item }}": "{{ lookup('ansible.builtin.password', inventory_dir ~ '/.credentials/' ~ item ~ ' chars=hexdigits length=32') | lower }}"
      when: lookup('ansible.builtin.vars', item, default='') == ''
      loop:
        - prowlarr_api_key
        - radarr_api_key
        - sonarr_api_key
      tags:
        - always

    # Persisted to .credentials/ so re-runs reuse the same value — the init
    # script only creates each user once, so a changing password would lock
    # you out. Charset is alphanumeric only: these are sourced from .env by
    # bash and embedded in curl JSON, so shell/JSON-special chars would break.
    - name: Auto-generate passwords when not provided
      set_fact:
        "{{ item }}": "{{ lookup('ansible.builtin.password', inventory_dir ~ '/.credentials/' ~ item ~ ' chars=ascii_letters,digits length=24') }}"
      when: lookup('ansible.builtin.vars', item, default='') == ''
      loop:
        - jellyfin_password
        - qbittorrent_password
      no_log: true
      tags:
        - always

  tasks:
    - name: Install Docker prerequisites
      become: yes
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - jq
          - python3
          - python3-pip
        state: present
        update_cache: yes
      tags:
        - setup
        - docker

    - name: Ensure apt keyrings directory exists
      become: yes
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags:
        - setup
        - docker

    - name: Add Docker GPG key
      become: yes
      get_url:
        url: https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags:
        - setup
        - docker

    - name: Add Docker apt repository
      become: yes
      apt_repository:
        repo: "deb [arch={{ ansible_facts.architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts.distribution | lower }} {{ ansible_facts.distribution_release }} stable"
        state: present
        filename: docker
      tags:
        - setup
        - docker

    - name: Install Docker CE and Compose plugin
      become: yes
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      tags:
        - setup
        - docker

    - name: Add user to docker group
      become: yes
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      tags:
        - setup
        - docker

    - name: Ensure Docker service is started
      become: yes
      systemd:
        name: docker
        state: started
        enabled: yes
      tags:
        - setup
        - docker

    - name: Setup UFW
      become: yes
      import_tasks: ./common/setup-ufw.tasks.yaml
      when: enable_firewall | default(true) | bool
      tags:
        - setup
        - firewall

    - name: Create content directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - "{{ content_dir }}"
        - "{{ media_dir }}"
        - "{{ torrents_dir }}"
        - "{{ media_dir }}/movies"
        - "{{ media_dir }}/tv"
        - "{{ torrents_dir }}/movies"
        - "{{ torrents_dir }}/tv"
      tags:
        - setup
        - directories

    - name: Create configuration directories
      file:
        path: "{{ root_dir }}/{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - config/traefik/letsencrypt
        - config/init
        - scripts
        - jellyfin
        - seerr
        - torrent/config/qBittorrent
        - media-management/prowlarr
        - media-management/radarr
        - media-management/sonarr
        - media-management/bazarr/config
      tags:
        - setup
        - directories

    - name: Set Seerr config directory ownership for node user (UID 1000)
      file:
        path: "{{ seerr_dir }}"
        state: directory
        mode: "0755"
        owner: "1000"
        group: "1000"
      tags:
        - setup
        - directories
        - seerr

    # qBittorrent stores its WebUI password as PBKDF2-HMAC-SHA512
    # (100k iterations, 16-byte salt). Computed with the Python stdlib on the
    # target host: works on any architecture and never exposes the password
    # in process arguments.
    - name: Generate qBittorrent PBKDF2 password hash
      command:
        cmd: >-
          python3 -c "import base64,hashlib,os,sys;
          pw=sys.stdin.read().rstrip('\n');
          salt=os.urandom(16);
          dk=hashlib.pbkdf2_hmac('sha512', pw.encode(), salt, 100000, dklen=64);
          print('@ByteArray(%s:%s)' % (base64.b64encode(salt).decode(), base64.b64encode(dk).decode()))"
        stdin: "{{ qbittorrent_password }}"
      register: password_output
      changed_when: false
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Store the generated password hash
      set_fact:
        qbittorrent_password_pbkdf2: "{{ password_output.stdout }}"
      no_log: true
      tags:
        - setup
        - config
        - torrent

    - name: Template stack configuration files
      template:
        src: "{{ item.src }}"
        dest: "{{ root_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { src: compose.yaml.j2, dest: compose.yaml }
        - { src: .env.j2, dest: .env, mode: "0600" }
        - { src: config/traefik.yml.j2, dest: config/traefik/traefik.yml }
        - { src: config/qbittorrent/qBittorrent.conf.j2, dest: torrent/config/qBittorrent/qBittorrent.conf }
        - { src: config/radarr.config.xml.j2, dest: media-management/radarr/config.xml }
        - { src: config/sonarr.config.xml.j2, dest: media-management/sonarr/config.xml }
        - { src: config/prowlarr.config.xml.j2, dest: media-management/prowlarr/config.xml }
        - { src: config/init/radarr.json.j2, dest: config/init/radarr.json }
        - { src: config/init/sonarr.json.j2, dest: config/init/sonarr.json }
        - { src: config/init/prowlarr.json.j2, dest: config/init/prowlarr.json }
        - { src: config/init/seerr.json.j2, dest: config/init/seerr.json }
        - { src: config/init/bazarr.json.j2, dest: config/init/bazarr.json }
      tags:
        - setup
        - config

    - name: Copy static configuration files
      copy:
        src: "{{ item.src }}"
        dest: "{{ root_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
      loop:
        - { src: config/qbittorrent/categories.json, dest: torrent/config/qBittorrent/categories.json }
        - { src: scripts/init-services.sh, dest: scripts/init-services.sh, mode: "0755" }
      tags:
        - setup
        - config

    - name: Start media server stack
      become: yes
      community.docker.docker_compose_v2:
        project_src: "{{ root_dir }}"
        state: present
        recreate: auto
      tags:
        - compose
        - jellyfin
        - seerr

    - name: Run one-shot service initialisation
      command: sg docker "{{ root_dir }}/scripts/init-services.sh"
      args:
        chdir: "{{ root_dir }}"
      register: init_result
      changed_when: "'All services initialised' in init_result.stdout"
      tags:
        - init
        - jellyfin
        - seerr
        - media-management
        - frontend
