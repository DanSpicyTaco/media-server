# Docker/Directories
internal_network: "media-network"
public_network: "reverse-proxy"

root_dir: "/home/{{ ansible_user }}/{{ server_name }}"
content_dir: "{{ root_dir }}/content"
media_dir: "{{ content_dir }}/media"
torrents_dir: "{{ content_dir }}/torrents"
config_dir: "{{ root_dir }}/config"
jellyfin_dir: "{{ root_dir }}/jellyfin"
seerr_dir: "{{ root_dir }}/seerr"
qbittorrent_dir: "{{ root_dir }}/torrent"
management_dir: "{{ root_dir }}/media-management"

# Network Binding (Defaults to localhost for VPS security behind Traefik. Override to 0.0.0.0 for LAN access)
bind_host: "127.0.0.1"

# Firewall
enable_firewall: true

# VPN Settings (Routing qBittorrent through Gluetun sidecar)
vpn_enabled: false
vpn_provider: "custom"
vpn_type: "wireguard"
# Add provider specific variables to inventory.ini if vpn_enabled is true
# vpn_username: "XXXX"
# vpn_password: "XXXX"
# vpn_wireguard_private_key: "XXXX"
# vpn_wireguard_addresses: "10.0.0.2/32"

# Public Facing Ports (localhost-bound admin UIs)
qbittorrent_port: 8080
prowlarr_port: 9696
radarr_port: 7878
sonarr_port: 8989
bazarr_port: 6767
seerr_port: 5055
jellyfin_port: 8096

# Jellyfin
jellyfin_username: "admin"
jellyfin_server_name: "{{ server_name }}"

# Seerr's admin account is created by authenticating against Jellyfin during
# init, so it reuses the Jellyfin username/password — no separate Seerr vars.

# Internal service URLs (Docker network hostnames)
prowlarr_server: "http://prowlarr:9696"
radarr_server: "http://radarr:7878"
sonarr_server: "http://sonarr:8989"
bazarr_server: "http://bazarr:6767"

# SSH (UFW allow rule) — set this if your VPS uses a non-standard SSH port,
# otherwise the firewall will lock you out.
ssh_port: 22

# qBittorrent WebUI username (defaults to your SSH user)
qbittorrent_username: "{{ ansible_user }}"

# Pinned image versions (verified 2026-06-11). Bump deliberately, then re-run
# the playbook with --tags compose.
traefik_version: "v3"
jellyfin_version: "10.11.11"
qbittorrent_version: "5.2.1"
radarr_version: "6.2.1"
sonarr_version: "4.0.17"
prowlarr_version: "2.4.0"
# NOTE: confirm the current linuxserver/bazarr tag before deploying (hub.docker.com/r/linuxserver/bazarr/tags).
bazarr_version: "1.5.1"
seerr_version: "v3.2.0"
